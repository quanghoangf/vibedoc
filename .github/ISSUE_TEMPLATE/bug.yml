name: Bug report
description: Something isn't working as expected
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: VibeDoc version
      placeholder: "e.g. 1.3.0 — run: npx vibedoc --version"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Steps to reproduce, expected vs actual behaviour
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      render: shell
